name: Promote mod assets

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number whose verified assets should be promoted
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: catalog-asset-promotion
  cancel-in-progress: false

jobs:
  promote:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: catalog-publishing
    steps:
      - name: Check out trusted promotion tooling
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Validate pull request
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const number = Number('${{ inputs.pull_request }}');
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number
            });
            if (pull.state !== 'open' || pull.draft || pull.base.ref !== 'main') {
              core.setFailed('Promotion requires an open, non-draft pull request targeting main.');
            }

      - name: Check out pull request data without credentials
        uses: actions/checkout@v7.0.0
        with:
          ref: refs/pull/${{ inputs.pull_request }}/merge
          path: submission
          fetch-depth: 2
          persist-credentials: false

      - name: Install JSON Schema validator
        run: python -m pip install check-jsonschema==0.36.1

      - name: Revalidate untrusted catalog data with trusted tooling
        shell: bash
        run: |
          mapfile -t games < <(find submission/games -mindepth 2 -maxdepth 2 -name game.json -type f -print)
          mapfile -t mods < <(find submission/games -mindepth 3 -maxdepth 3 -path '*/mods/*.json' -type f -print)
          check-jsonschema --schemafile schemas/game.schema.json examples/game.json "${games[@]}"
          check-jsonschema --schemafile schemas/mod.schema.json examples/mod.json "${mods[@]}"
          node scripts/validate.mjs --catalog-root submission

      - name: Download and verify changed upstream assets
        shell: bash
        run: |
          mapfile -t definitions < <(
            git -C submission diff --diff-filter=AMR --name-only HEAD^1 HEAD^2 -- 'games/*/mods/*.json'
          )
          if (( ${#definitions[@]} == 0 )); then
            echo "This pull request contains no new or changed mod definitions." >&2
            exit 1
          fi
          arguments=()
          for definition in "${definitions[@]}"; do
            arguments+=(--definition "$definition")
          done
          python scripts/verify_release_assets.py \
            --catalog-root submission \
            --output-dir staged-assets \
            --manifest staged-assets/manifest.tsv \
            "${arguments[@]}"

      - name: Publish immutable catalog copies
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          while IFS=$'\t' read -r tag asset path; do
            if gh release view "$tag" >/dev/null 2>&1; then
              existing="existing-assets/$tag"
              mkdir -p "$existing"
              if gh release download "$tag" --pattern "$asset" --dir "$existing" >/dev/null 2>&1; then
                cmp --silent "$path" "$existing/$asset" || {
                  echo "Refusing to replace an existing release asset: $tag/$asset" >&2
                  exit 1
                }
                echo "Already promoted: $tag/$asset"
              else
                echo "Refusing to modify an existing release: $tag" >&2
                exit 1
              fi
            else
              gh release create "$tag" "$path#$asset" \
                --title "$tag" \
                --notes "Verified GameTweaks catalog copy promoted from pull request #${{ inputs.pull_request }}."
            fi
          done < staged-assets/manifest.tsv
