name: Validate catalog

on:
  pull_request:
  pull_request_review:
    types: [submitted, dismissed]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'push' && github.sha || format('refs/pull/{0}/merge', github.event.pull_request.number) }}
          fetch-depth: 0

      - name: Install JSON Schema validator
        run: python -m pip install check-jsonschema==0.36.1

      - name: Validate game definitions
        shell: bash
        run: |
          mapfile -t files < <(find games -mindepth 2 -maxdepth 2 -name game.json -type f -print)
          check-jsonschema --schemafile schemas/game.schema.json examples/game.json "${files[@]}"

      - name: Validate mod definitions
        shell: bash
        run: |
          mapfile -t files < <(find games -mindepth 3 -maxdepth 3 -path '*/mods/*.json' -type f -print)
          check-jsonschema --schemafile schemas/mod.schema.json examples/mod.json examples/official-mod.json "${files[@]}"

      - name: Validate paths, references and digests
        run: node scripts/validate.mjs

      - name: Test schemas and release archive validation
        run: python -m unittest scripts/test_mod_schema.py scripts/test_verify_release_assets.py

      - name: Verify changed upstream release assets
        if: github.event_name != 'push'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t definitions < <(
            git diff --diff-filter=AMR --name-only "$BASE_SHA"...HEAD -- 'games/*/mods/*.json'
          )
          if (( ${#definitions[@]} == 0 )); then
            echo "No changed mod release assets to verify."
            exit 0
          fi
          arguments=()
          for definition in "${definitions[@]}"; do
            arguments+=(--definition "$definition")
          done
          python scripts/verify_release_assets.py "${arguments[@]}"

      - name: Detect changed Official definitions
        if: github.event_name != 'push'
        id: official
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          changed=false
          while IFS= read -r definition; do
            if [[ -f "$definition" ]] && jq -e '.official == true' "$definition" >/dev/null; then
              changed=true
              break
            fi
          done < <(git diff --diff-filter=AMR --name-only "$BASE_SHA"...HEAD -- 'games/*/mods/*.json')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Require approved maintainer review for Official definitions
        if: github.event_name != 'push' && steps.official.outputs.changed == 'true'
        uses: actions/github-script@v8.0.0
        env:
          OFFICIAL_REVIEWERS: ${{ vars.OFFICIAL_REVIEWERS }}
        with:
          script: |
            const allowed = new Set(
              (process.env.OFFICIAL_REVIEWERS || '')
                .split(',')
                .map((name) => name.trim().toLowerCase())
                .filter(Boolean)
            );
            if (allowed.size === 0) {
              core.setFailed('Configure the OFFICIAL_REVIEWERS repository variable before accepting Official mods.');
              return;
            }
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const approved = reviews.some(
              (review) =>
                review.state === 'APPROVED' &&
                review.commit_id === context.payload.pull_request.head.sha &&
                allowed.has(review.user.login.toLowerCase())
            );
            if (!approved) {
              core.setFailed('An allowed Official reviewer must approve the current pull request head after reviewing its source provenance.');
            }
